# MEGA BRAIN - FULL PIPELINE WORKFLOW
# Padrão: Pedro (aios-core/squad-creator)
# Versão: 2.0.0

workflow:
  id: wf-pipeline-full
  name: "Full Pipeline Processing"
  description: "Executa pipeline completo: triage → ingest → process → enrich → compile"
  version: "2.0.0"

  # Orchestrator
  orchestrator: "@jarvis"

  # Input requirements
  inputs:
    - name: source_code
      type: string
      required: true
      description: "Código da fonte (e.g., CG, JM, JH)"
    - name: files
      type: array
      required: true
      description: "Lista de arquivos a processar"
    - name: skip_triage
      type: boolean
      required: false
      default: false
      description: "Skip phase_0 triage (for known-good sources)"
    - name: brownfield
      type: boolean
      required: false
      default: false
      description: "Brownfield mode - incremental update of existing clone"

  # Phases
  phases:
    - id: phase_0
      name: "TRIAGE"
      description: "Pre-pipeline viability scoring (APEX)"
      blocking: false
      steps:
        - execute:
            task: "tasks/score-viability.md"
            inputs:
              source_code: "${source_code}"
              files: "${files}"
      checkpoint:
        id: CP_TRIAGE
        blocking: false
        validation:
          - "viability_score_calculated"
          - "verdict_assigned"

    - id: phase_0b
      name: "BROWNFIELD_CHECK"
      description: "Detect existing clone and compute diff (if brownfield mode)"
      condition: "${brownfield} == true"
      steps:
        - execute:
            task: "tasks/pipeline/detect-brownfield.md"
            inputs:
              source_code: "${source_code}"
        - execute:
            task: "tasks/pipeline/diff-analysis.md"
            inputs:
              source_code: "${source_code}"
              files: "${files}"
      checkpoint:
        id: CP_BROWNFIELD
        blocking: true
        validation:
          - "existing_clone_detected"
          - "diff_computed"

    - id: phase_1
      name: "FOUNDATION"
      description: "Preparação e normalização"
      steps:
        - execute:
            task: "tasks/normalize-entities.md"
            inputs:
              content: "${files}"
        - execute:
            task: "tasks/detect-role.md"
            inputs:
              content: "${files}"
      checkpoint:
        id: CP_FOUNDATION
        blocking: true
        validation:
          - "entities_normalized"
          - "roles_detected"

    - id: phase_2
      name: "INTELLIGENCE"
      description: "Análise temática e classificação"
      steps:
        - execute:
            task: "tasks/analyze-themes.md"
            inputs:
              entities: "${phase_1.entities}"
              role: "${phase_1.primary_role}"
      checkpoint:
        id: CP_INTELLIGENCE
        blocking: true
        validation:
          - "themes_identified"

    - id: phase_3
      name: "EXTRACTION"
      description: "Extração de DNA e conhecimento"
      steps:
        - execute:
            task: "tasks/extract-dna.md"
            inputs:
              themes: "${phase_2.themes}"
              source_id: "${source_code}"
      checkpoint:
        id: CP_EXTRACTION
        blocking: true
        validation:
          - "dna_complete"
          - "all_8_layers_populated"

    - id: phase_4
      name: "PIPELINE"
      description: "Processamento de batches"
      steps:
        - execute:
            task: "tasks/process-batch.md"
            inputs:
              source_code: "${source_code}"
              files: "${files}"
      checkpoint:
        id: CP_PIPELINE
        blocking: true
        validation:
          - "batch_log_complete"
          - "dual_location_logs"
          - "cascading_executed"

    - id: phase_5
      name: "VALIDATION"
      description: "Validação final e integridade"
      steps:
        - execute:
            task: "tasks/validate-cascade.md"
            inputs:
              batch_id: "${phase_4.batch_id}"
      checkpoint:
        id: CP_VALIDATION
        blocking: true
        gate_id: "QG-VALIDATION-001"
        validation:
          - "status_passed"

    - id: phase_6
      name: "COMPILATION"
      description: "Compile DNA into deployable system prompt"
      blocking: false
      steps:
        - execute:
            task: "tasks/compile-system-prompt.md"
            inputs:
              source_code: "${source_code}"
              dna_config: "${phase_3.dna_config}"
      checkpoint:
        id: CP_COMPILATION
        blocking: false
        validation:
          - "system_prompt_generated"
          - "communication_patterns_applied"

  # Transitions
  transitions:
    - from: phase_0
      to: phase_0b
      condition: "${brownfield} == true"
    - from: phase_0
      to: phase_1
      condition: "viability_verdict != REJECT"
    - from: phase_0b
      to: phase_1
      condition: "checkpoint_passed"
    - from: phase_1
      to: phase_2
      condition: "checkpoint_passed"
    - from: phase_2
      to: phase_3
      condition: "checkpoint_passed"
    - from: phase_3
      to: phase_4
      condition: "checkpoint_passed"
    - from: phase_4
      to: phase_5
      condition: "checkpoint_passed"
    - from: phase_5
      to: phase_6
      condition: "checkpoint_passed"

  # Error handling
  on_error:
    - action: "log_error"
    - action: "notify_user"
    - action: "rollback_to_checkpoint"

  # Output
  outputs:
    - name: batch_log
      type: file
      location: "logs/batches/"
    - name: dna_config
      type: file
      location: "agents/minds/{source}/DNA-CONFIG.yaml"
    - name: validation_report
      type: json
    - name: system_prompt
      type: file
      location: "agents/minds/{source}/SYSTEM-PROMPT.md"
